<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velox Logística - Alta de cliente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

  <style>
    body{ background-color:#0b1320; color:#e8eefc; }
    .panel{ background-color:#111b2e; border:1px solid #26324a; border-radius:14px; }
    .panel-header{ border-bottom:1px solid #26324a; background-color:#0f172a; border-top-left-radius:14px; border-top-right-radius:14px; }
    .panel a{ color:#c9d4ff; }
    .legend-title{ color:#e8eefc; }
  </style>
</head>
<body>

<!-- LUCÍA TEJEDOR DE LA CRUZ - ltejedor -->

<header class="py-4">
  <div class="container">
    <h1 class="text-center mb-1">Velox Logística</h1>
    <h2 class="text-center h4 mb-3">Alta de cliente</h2>
    <p class="text-center mb-0">Rellena los datos para crear una cuenta y poder gestionar envíos.</p>
  </div>
</header>

<main class="container mb-5">
  <div class="panel">
    <div class="panel-header p-3">
      <h3 class="h5 mb-0">Formulario de alta</h3>
    </div>

    <div class="p-3 p-md-4">
      <form action="alta02.html"> <!-- enctype="multipart/form-data"-->
        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Tipo de cuenta</legend>

          <div class="form-check mt-2">
            <input class="form-check-input" type="radio" id="tipo_particular" name="tipo_cuenta" value="particular" checked>
            <label class="form-check-label" for="tipo_particular">Particular</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="radio" id="tipo_empresa" name="tipo_cuenta" value="empresa">
            <label class="form-check-label" for="tipo_empresa">Empresa</label>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Datos de acceso</legend>

          <div class="row g-3 mt-1">
            <div class="col-12 col-md-6">
              <label for="email" class="form-label">Correo electrónico:</label>
              <input class="form-control" type="email" id="email" name="email" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="usuario" class="form-label">Usuario:</label>
              <input class="form-control" type="text" id="usuario" name="usuario" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="clave" class="form-label">Contraseña:</label>
              <input class="form-control" type="password" id="clave" name="clave" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="clave2" class="form-label">Repite la contraseña:</label>
              <input class="form-control" type="password" id="clave2" name="clave2" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="pin" class="form-label">PIN de seguridad (4 dígitos):</label>
              <input class="form-control" type="password" id="pin" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4">
            </div>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Datos del titular</legend>

          <div class="row g-3 mt-1">
            <div class="col-12 col-md-6">
              <label for="nombre" class="form-label">Nombre:</label>
              <input class="form-control" type="text" id="nombre" name="nombre" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="apellidos" class="form-label">Apellidos:</label>
              <input class="form-control" type="text" id="apellidos" name="apellidos" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="doc" class="form-label">Documento (DNI/NIE/CIF):</label>
              <input class="form-control" type="text" id="doc" name="doc" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="telefono" class="form-label">Teléfono:</label>
              <input class="form-control" type="tel" id="telefono" name="telefono" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="nacimiento" class="form-label">Fecha de nacimiento:</label>
              <input class="form-control" type="date" id="nacimiento" name="nacimiento">
            </div>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Dirección principal</legend>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label for="direccion" class="form-label">Dirección:</label>
              <input class="form-control" type="text" id="direccion" name="direccion" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="ciudad" class="form-label">Ciudad:</label>
              <input class="form-control" type="text" id="ciudad" name="ciudad" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="provincia" class="form-label">Provincia:</label>
              <input class="form-control" type="text" id="provincia" name="provincia">
            </div>

            <div class="col-12 col-md-6">
              <label for="cp" class="form-label">Código postal:</label>
              <input class="form-control" type="text" id="cp" name="cp" required>
            </div>

            <div class="col-12 col-md-6">
              <label for="pais" class="form-label">País:</label>
              <select class="form-select" id="pais" name="pais" required>
                <option value="">-- Selecciona --</option>
                <option value="ES">España</option>
                <option value="PT">Portugal</option>
                <option value="FR">Francia</option>
                <option value="OTRO">Otro</option>
              </select>
            </div>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Facturación</legend>

          <div class="row g-3 mt-1">
            <div class="col-12 col-md-6">
              <label for="facturacion" class="form-label">Tipo de facturación:</label>
                <select class="form-select" id="facturacion" name="facturacion" required>
                <option value="">-- Selecciona una opción --</option>
                <option value="sin_factura">No necesito factura</option>
                <option value="factura_email">Factura por email</option>
                <option value="factura_postal">Factura postal</option>
                </select>
            </div>
            

            <div class="col-12 col-md-6">
              <label for="iban" class="form-label">IBAN (si domicilias pagos):</label>
              <input class="form-control" type="text" id="iban" name="iban">
            </div>

            <div class="col-12 col-md-6">
              <label for="limite_mensual" class="form-label">Límite mensual (EUR):</label>
              <input class="form-control" type="number" id="limite_mensual" name="limite_mensual" min="0" step="1">
            </div>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Preferencias y comunicaciones</legend>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="notif_email" name="notif_email" value="si" checked>
                <label class="form-check-label" for="notif_email">Avisos por email</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="notif_sms" name="notif_sms" value="si">
                <label class="form-check-label" for="notif_sms">Avisos por SMS</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="publi" name="publi" value="si">
                <label class="form-check-label" for="publi">Recibir ofertas y promociones</label>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <label for="idioma" class="form-label">Idioma:</label>
              <select class="form-select" id="idioma" name="idioma">
                <option value="es" selected>Español</option>
                <option value="en">Inglés</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label for="color_cuenta" class="form-label">Color identificativo (opcional):</label>
              <input class="form-control form-control-color" type="color" id="color_cuenta" name="color_cuenta">
            </div>
          </div>
        </fieldset>

        <fieldset class="border rounded p-3 mb-3">
          <legend class="legend-title float-none w-auto px-2 mb-0">Documentación (opcional)</legend>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label for="doc_subida" class="form-label">Subir documento (PDF/imagen):</label>
              <input class="form-control" type="file" id="doc_subida" name="doc_subida">
            </div>

            <div class="col-12">
              <label for="observaciones" class="form-label">Observaciones:</label>
              <textarea class="form-control" id="observaciones" name="observaciones" rows="4" cols="50"></textarea>
            </div>
          </div>
        </fieldset>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="condiciones" name="condiciones" value="acepto" required>
          <label class="form-check-label" for="condiciones">Acepto las condiciones del servicio</label>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Crear cuenta</button>
          <button class="btn btn-secondary" type="reset">Borrar</button>
        </div>
      </form>

      <p class="mt-4 mb-0">
        Ir a operar (crear envío): <a href="operacion.html">operacion.html</a>
      </p>
    </div>
  </div>
</main>
</body>
</html>
